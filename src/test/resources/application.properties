spring.datasource.url=jdbc:h2:mem:trades_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.jwt.secret=change-this-secret-key-to-a-very-long-secure-value
app.jwt.expiration-ms=86400000
app.verification.base-url=http://localhost:8080/api/auth/verify-email?token=
app.mail.from=no-reply@pawfectfoods.com
app.bootstrap.reset-data=false
app.file.upload-dir=uploads/trades-test
app.file.max-size-bytes=5242880
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test
